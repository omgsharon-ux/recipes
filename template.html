<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECIPE_NAME</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Page chrome ─────────────────────────────── */
        main {
            padding-bottom: 40px;
        }

        footer {
            padding: 24px 0 60px;
            font-size: 22px;
            text-align: center;
            color: #888;
            border-top: 1px solid #e8e8e8;
            margin-top: 40px;
        }

        /* ── Back link ───────────────────────────────── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 20px 0 16px;
            font-size: 22px;
            color: #6bb8d4;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .back-link:hover {
            color: #4a9db8;
        }

        /* ── Hero image ──────────────────────────────── */
        .hero-wrap {
            position: relative;
            margin-bottom: 32px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        .recipe-image {
            width: 100%;
            display: block;
            margin-bottom: 0;
        }

        /* ── Section headings ────────────────────────── */
        .section-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #222;
            margin: 36px 0 18px;
            padding-bottom: 8px;
            border-bottom: 3px solid #6bb8d4;
        }

        .section-heading .icon {
            font-size: 22px;
        }

        /* ── Checklist items ─────────────────────────── */
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: #f8fbfd;
            border-radius: 8px;
            border-left: 4px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }

        .check-item:has(input:checked) {
            border-left-color: #6bb8d4;
            background: #eef7fb;
        }

        .check-item input[type="checkbox"] {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            margin-top: 2px;
            accent-color: #6bb8d4;
            cursor: pointer;
        }

        .check-item label {
            font-size: 24px;
            line-height: 1.4;
            cursor: pointer;
            flex: 1;
        }

        input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: #999;
        }

        /* Step numbers */
        .step-num {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            background: #6bb8d4;
            color: white;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0;
        }

        .check-item:has(input:checked) .step-num {
            background: #a8d8ea;
        }

        /* ── Notes section ───────────────────────────── */
        .notes {
            margin-top: 12px;
        }

        .notes-body {
            background: #fffbf0;
            border-left: 4px solid #f0c040;
            border-radius: 0 8px 8px 0;
            padding: 16px 20px;
            font-size: 24px;
            line-height: 1.5;
            color: #555;
        }

        /* ── FDA Nutrition Facts Label ───────────────── */
        .nutrition {
            margin-top: 12px;
        }

        .nf-label {
            font-family: Arial, Helvetica, sans-serif;
            border: 2px solid #000;
            padding: 4px 6px 4px;
            max-width: 320px;
            box-sizing: border-box;
        }

        .nf-title {
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
            margin: 0 0 0;
            letter-spacing: -0.5px;
        }

        .nf-servings-count {
            font-size: 14px;
            margin: 2px 0 0;
        }

        .nf-serving-size {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin: 2px 0 3px;
        }

        /* Thick black bars */
        .nf-bar-thick {
            background: #000;
            height: 10px;
            margin: 4px -6px;
        }

        .nf-bar-medium {
            background: #000;
            height: 5px;
            margin: 4px -6px;
        }

        /* Thin gray rules */
        .nf-rule {
            border: none;
            border-top: 1px solid #888;
            margin: 2px 0;
        }

        /* Calories block */
        .nf-calories-block {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .nf-calories-label {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
        }

        .nf-calories-sub {
            font-size: 10px;
            font-weight: 400;
        }

        .nf-calories-num {
            font-size: 52px;
            font-weight: 900;
            line-height: 1;
        }

        /* DV header line */
        .nf-dv-header {
            font-size: 11px;
            font-weight: 700;
            text-align: right;
            margin: 2px 0;
        }

        /* Nutrient rows */
        .nf-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 13px;
            padding: 1px 0;
        }

        .nf-row .nf-name {
            flex: 1;
        }

        .nf-row .nf-dv {
            font-weight: 700;
            white-space: nowrap;
        }

        .nf-row.bold .nf-name {
            font-weight: 700;
        }

        .nf-row.indent .nf-name {
            padding-left: 16px;
            font-weight: 400;
        }

        .nf-row.double-indent .nf-name {
            padding-left: 28px;
            font-weight: 400;
        }

        /* Vitamins section (thick bar before it, thin rules within) */
        .nf-vitamins {
            border-top: 7px solid #000;
        }

        .nf-vit-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 1px 0;
            border-bottom: 1px solid #888;
        }

        .nf-vit-row:last-child {
            border-bottom: none;
        }

        /* Footnote */
        .nf-footnote {
            font-size: 9px;
            border-top: 1px solid #000;
            margin-top: 4px;
            padding-top: 3px;
            line-height: 1.3;
        }

        /* ── Reset button ────────────────────────────── */
        .reset-button {
            width: 100%;
            max-width: 100%;
            height: auto;
            padding: 24px 0;
            margin: 40px auto 0;
            font-size: 22px;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #6bb8d4 0%, #4a9db8 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(107,184,212,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .reset-button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(107,184,212,0.3);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-banner">RECIPE_NAME</div>
    </header>

    <main>
        <a href="index.html" class="back-link">&#8592; Back to Recipes</a>

        <div class="hero-wrap">
            <img src="images/IMAGE_FILENAME" alt="RECIPE_NAME" class="recipe-image">
        </div>

        <!-- INGREDIENTS ─────────────────────────────── -->
        <div class="ingredients">
            <h2 class="section-heading"><span class="icon">🛒</span> Ingredients</h2>
            INGREDIENTS_LIST
        </div>

        <!-- INSTRUCTIONS ────────────────────────────── -->
        <div class="preparation">
            <h2 class="section-heading"><span class="icon">👩‍🍳</span> Instructions</h2>
            STEPS_LIST
        </div>

        <!-- NOTES (omit entire block if no notes) ───── -->
        NOTES_SECTION

        <!-- NUTRITION ───────────────────────────────── -->
        <div class="nutrition">
            <h2 class="section-heading"><span class="icon">📊</span> Nutrition</h2>
            NUTRITION_FACTS_LABEL
        </div>

        <button class="reset-button" onclick="resetCheckboxes()">&#10003; Reset All Checkboxes</button>
    </main>

    <footer>Powered by &#9749; &amp; &#127790;</footer>

    <script>
        function resetCheckboxes() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        }
    </script>
</body>
</html>
