<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Lemon Curd Mousse</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        main { padding-bottom: 40px; }
        footer { padding: 24px 0 60px; font-size: 22px; text-align: center; color: #888; border-top: 1px solid #e8e8e8; margin-top: 40px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin: 20px 0 16px; font-size: 22px; color: #6bb8d4; text-decoration: none; font-weight: 600; letter-spacing: 0.01em; }
        .back-link:hover { color: #4a9db8; }
        header { position: relative; height: 300px; background-size: cover; background-position: center; background-color: #444; overflow: hidden; width: 100vw; margin-left: calc(-50vw + 50%); }
        header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 55%, transparent 100%); }
        header .header-banner { position: absolute; bottom: 0; left: 0; right: 0; padding: 22px 8%; color: #fff; font-size: 32px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; background: none; height: auto; display: block; text-align: left; z-index: 1; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .section-heading { display: flex; align-items: center; gap: 10px; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #222; margin: 36px 0 18px; padding-bottom: 8px; border-bottom: 3px solid #6bb8d4; }
        .section-heading .icon { font-size: 22px; }
        .check-item { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; padding: 14px 16px; background: #f8fbfd; border-radius: 8px; border-left: 4px solid transparent; transition: border-color 0.2s, background 0.2s; }
        .check-item:has(input:checked) { border-left-color: #6bb8d4; background: #eef7fb; }
        .check-item input[type="checkbox"] { flex-shrink: 0; width: 28px; height: 28px; margin-top: 2px; accent-color: #6bb8d4; cursor: pointer; }
        .check-item label { font-size: 24px; line-height: 1.4; cursor: pointer; flex: 1; }
        input[type="checkbox"]:checked + label { text-decoration: line-through; color: #999; }
        input[type="checkbox"]:checked + .step-num + label { text-decoration: line-through; color: #999; }
        .step-num { flex-shrink: 0; width: 36px; height: 36px; background: #6bb8d4; color: white; font-size: 18px; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 0; }
        .check-item:has(input:checked) .step-num { background: #a8d8ea; }
        .notes { margin-top: 12px; }
        .notes-body { background: #fffbf0; border-left: 4px solid #f0c040; border-radius: 0 8px 8px 0; padding: 16px 20px; font-size: 24px; line-height: 1.5; color: #555; }
        .subheading { font-size: 20px; font-weight: 700; color: #4a9db8; margin: 28px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }
        .reset-button { width: 100%; max-width: 100%; height: auto; padding: 24px 0; margin: 40px auto 0; font-size: 22px; font-weight: 800; color: white; background: linear-gradient(135deg, #6bb8d4 0%, #4a9db8 100%); border: none; border-radius: 10px; cursor: pointer; display: block; letter-spacing: 0.05em; text-transform: uppercase; box-shadow: 0 4px 12px rgba(107,184,212,0.4); transition: transform 0.1s, box-shadow 0.1s; }
        .reset-button:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(107,184,212,0.3); }
    </style>
</head>
<body>
    <header style="background-image: url('images/easy-lemon-curd-mousse.jpg')">
        <div class="header-banner">Easy Lemon Curd Mousse</div>
    </header>
    <main>
        <a href="index.html" class="back-link">&#8592; Back to Recipes</a>
        <p style="font-size:20px; color:#666; margin:4px 0 0; font-style:italic;">Serves 4</p>

        <div class="ingredients">
            <h2 class="section-heading"><span class="icon">🛒</span> Ingredients</h2>
            <p class="subheading">Graham Cracker Base</p>
            <div class="check-item"><input type="checkbox" id="ing1"><label for="ing1">2 full-size graham crackers</label></div>
            <div class="check-item"><input type="checkbox" id="ing2"><label for="ing2">1 tablespoon brown sugar (light or dark)</label></div>
            <div class="check-item"><input type="checkbox" id="ing3"><label for="ing3">3 tablespoons shredded unsweetened coconut</label></div>
            <div class="check-item"><input type="checkbox" id="ing4"><label for="ing4">3 tablespoons finely chopped pecans</label></div>
            <div class="check-item"><input type="checkbox" id="ing5"><label for="ing5">2 1/2 tablespoons melted butter</label></div>
            <p class="subheading">Mousse</p>
            <div class="check-item"><input type="checkbox" id="ing6"><label for="ing6">4 ounces softened cream cheese</label></div>
            <div class="check-item"><input type="checkbox" id="ing7"><label for="ing7">1 3/4 cups lemon curd</label></div>
            <div class="check-item"><input type="checkbox" id="ing8"><label for="ing8">1/2 cup heavy cream</label></div>
        </div>

        <div class="preparation">
            <h2 class="section-heading"><span class="icon">👩‍🍳</span> Instructions</h2>
            <p class="subheading">Graham Cracker Base</p>
            <div class="check-item"><input type="checkbox" id="step1"><span class="step-num">1</span><label for="step1">Preheat oven to 350°F. Line a sheet pan with foil.</label></div>
            <div class="check-item"><input type="checkbox" id="step2"><span class="step-num">2</span><label for="step2">Place graham crackers in a sealed zippered bag and roll with a rolling pin until finely crushed. Transfer to a medium bowl.</label></div>
            <div class="check-item"><input type="checkbox" id="step3"><span class="step-num">3</span><label for="step3">Add brown sugar, coconut, pecans, and melted butter. Stir well to coat. Spread on the prepared pan.</label></div>
            <div class="check-item"><input type="checkbox" id="step4"><span class="step-num">4</span><label for="step4">Bake 8–10 minutes until golden and crunchy, stirring halfway through. Divide between 4 six- or eight-ounce jars and pack down slightly. Allow to cool completely.</label></div>
            <p class="subheading">Mousse</p>
            <div class="check-item"><input type="checkbox" id="step5"><span class="step-num">5</span><label for="step5">Whisk cream cheese in a medium bowl until smooth. Add lemon curd and whisk until smooth and creamy.</label></div>
            <div class="check-item"><input type="checkbox" id="step6"><span class="step-num">6</span><label for="step6">With a whisk or handheld mixer, whip the heavy cream until soft peaks form.</label></div>
            <div class="check-item"><input type="checkbox" id="step7"><span class="step-num">7</span><label for="step7">Fold whipped cream into lemon curd mixture until just combined. Divide between the 4 jars. Garnish with whipped cream and fresh fruit if desired.</label></div>
        </div>
        <div class="notes">
            <h2 class="section-heading">Notes</h2>
            <p class="notes-body">Source: <a href="https://thecafesucrefarine.com/easy-lemon-curd-mousse/" style="color:#6bb8d4;">thecafesucrefarine.com</a></p>
        </div>
        <button class="reset-button" onclick="resetCheckboxes()">&#10003; Reset All Checkboxes</button>
    </main>
    <footer>Powered by &#9749; &amp; &#127790;</footer>
    <script>
        function resetCheckboxes() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        }
    </script>
</body>
</html>
