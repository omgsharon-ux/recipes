<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make-Ahead Dagwood Sandwiches</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        main{padding-bottom:40px}footer{padding:24px 0 60px;font-size:22px;text-align:center;color:#888;border-top:1px solid #e8e8e8;margin-top:40px}.back-link{display:inline-flex;align-items:center;gap:6px;margin:20px 0 16px;font-size:22px;color:#6bb8d4;text-decoration:none;font-weight:600}.back-link:hover{color:#4a9db8}header{position:relative;height:300px;background-size:cover;background-position:center;background-color:#444;overflow:hidden;width:100vw;margin-left:calc(-50vw + 50%)}header::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.15) 55%,transparent 100%)}header .header-banner{position:absolute;bottom:0;left:0;right:0;padding:22px 8%;color:#fff;font-size:32px;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;background:none;height:auto;display:block;text-align:left;z-index:1;text-shadow:0 2px 6px rgba(0,0,0,.5)}.section-heading{display:flex;align-items:center;gap:10px;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#222;margin:36px 0 18px;padding-bottom:8px;border-bottom:3px solid #6bb8d4}.section-heading .icon{font-size:22px}.check-item{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding:14px 16px;background:#f8fbfd;border-radius:8px;border-left:4px solid transparent;transition:border-color .2s,background .2s}.check-item:has(input:checked){border-left-color:#6bb8d4;background:#eef7fb}.check-item input[type=checkbox]{flex-shrink:0;width:28px;height:28px;margin-top:2px;accent-color:#6bb8d4;cursor:pointer}.check-item label{font-size:24px;line-height:1.4;cursor:pointer;flex:1}input[type=checkbox]:checked+label{text-decoration:line-through;color:#999}.step-num{flex-shrink:0;width:36px;height:36px;background:#6bb8d4;color:#fff;font-size:18px;font-weight:800;border-radius:50%;display:flex;align-items:center;justify-content:center}.check-item:has(input:checked) .step-num{background:#a8d8ea}.notes{margin-top:12px}.notes-body{background:#fffbf0;border-left:4px solid #f0c040;border-radius:0 8px 8px 0;padding:16px 20px;font-size:24px;line-height:1.5;color:#555;margin-bottom:12px}.nutrition{margin-top:12px}.nf-label{font-family:Arial,Helvetica,sans-serif;border:2px solid #000;padding:4px 6px;max-width:320px;box-sizing:border-box}.nf-title{font-size:36px;font-weight:900;line-height:1;margin:0;letter-spacing:-.5px}.nf-servings-count{font-size:14px;margin:2px 0 0}.nf-serving-size{font-size:14px;font-weight:700;display:flex;justify-content:space-between;margin:2px 0 3px}.nf-bar-thick{background:#000;height:10px;margin:4px -6px}.nf-bar-medium{background:#000;height:5px;margin:4px -6px}.nf-rule{border:none;border-top:1px solid #888;margin:2px 0}.nf-calories-block{display:flex;align-items:flex-end;justify-content:space-between}.nf-calories-label{font-size:13px;font-weight:700;line-height:1.1}.nf-calories-num{font-size:52px;font-weight:900;line-height:1}.nf-dv-header{font-size:11px;font-weight:700;text-align:right;margin:2px 0}.nf-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:1px 0}.nf-row .nf-name{flex:1}.nf-row .nf-dv{font-weight:700;white-space:nowrap}.nf-row.bold .nf-name{font-weight:700}.nf-row.indent .nf-name{padding-left:16px;font-weight:400}.nf-vitamins{border-top:7px solid #000}.nf-vit-row{display:flex;justify-content:space-between;font-size:12px;padding:1px 0;border-bottom:1px solid #888}.nf-vit-row:last-child{border-bottom:none}.nf-footnote{font-size:9px;border-top:1px solid #000;margin-top:4px;padding-top:3px;line-height:1.3}.reset-button{width:100%;padding:24px 0;margin:40px auto 0;font-size:22px;font-weight:800;color:#fff;background:linear-gradient(135deg,#6bb8d4 0%,#4a9db8 100%);border:none;border-radius:10px;cursor:pointer;display:block;letter-spacing:.05em;text-transform:uppercase;box-shadow:0 4px 12px rgba(107,184,212,.4)}.reset-button:active{transform:translateY(1px)}
    </style>
</head>
<body>
    <header style="background-image: url('images/make-ahead-dagwood-sandwiches.jpg')">
        <div class="header-banner">Make-Ahead Dagwood Sandwiches</div>
    </header>
    <main>
        <a href="index.html" class="back-link">&#8592; Back to Recipes</a>
        <p style="font-size:22px;color:#666;margin:4px 0 0;">Servings: 12</p>
        <div class="ingredients">
            <h2 class="section-heading"><span class="icon">🛒</span> Ingredients</h2>
            <div class="check-item"><input type="checkbox" id="ing1"><label for="ing1">2 loaves herb-flavored or cheese-flavored bread, such as Focaccia, ciabatta or Asiago cheese bread (1 lb each, about 1 inch thick)</label></div>
            <div class="check-item"><input type="checkbox" id="ing2"><label for="ing2">1 container (6.5 oz) garlic-and-herbs spreadable cheese</label></div>
            <div class="check-item"><input type="checkbox" id="ing3"><label for="ing3">1 lb thinly sliced smoked turkey</label></div>
            <div class="check-item"><input type="checkbox" id="ing4"><label for="ing4">8 oz sliced provolone cheese</label></div>
            <div class="check-item"><input type="checkbox" id="ing5"><label for="ing5">8 oz thinly sliced salami</label></div>
            <div class="check-item"><input type="checkbox" id="ing6"><label for="ing6">1/4 cup loosely packed fresh basil leaves</label></div>
            <div class="check-item"><input type="checkbox" id="ing7"><label for="ing7">8 slices bacon, cooked</label></div>
            <div class="check-item"><input type="checkbox" id="ing8"><label for="ing8">1 sweet onion, thinly sliced, separated into rings</label></div>
            <div class="check-item"><input type="checkbox" id="ing9"><label for="ing9">3 small plum (Roma) tomatoes, sliced</label></div>
            <div class="check-item"><input type="checkbox" id="ing10"><label for="ing10">4 cups lightly packed torn arugula</label></div>
            <div class="check-item"><input type="checkbox" id="ing11"><label for="ing11">1/2 cup basil pesto</label></div>
        </div>
        <div class="preparation">
            <h2 class="section-heading"><span class="icon">👩‍🍳</span> Instructions</h2>
            <div class="check-item"><input type="checkbox" id="step1"><span class="step-num">1</span><label for="step1">With long serrated knife, cut bread in half horizontally. Spread cut side of each bread bottom with half of the spreadable cheese. Overlapping slices, arrange remaining ingredients except pesto in order listed over each bread bottom. Spread cut side of each bread top with half of the pesto, and place over arugula.</label></div>
            <div class="check-item"><input type="checkbox" id="step2"><span class="step-num">2</span><label for="step2">Place each whole loaf in large food-storage plastic bag; seal and refrigerate topped with a cast-iron skillet or other heavy weight up to 24 hours.</label></div>
            <div class="check-item"><input type="checkbox" id="step3"><span class="step-num">3</span><label for="step3">When ready to serve, cut each loaf into 6 equal sandwiches. Secure sandwiches with toothpicks or small skewers.</label></div>
        </div>
        <div class="notes">
            <h2 class="section-heading">Notes</h2>
            <p class="notes-body">Recipe from <a href="https://www.bettycrocker.com/recipes/make-ahead-dagwood-sandwiches/d35bf1ba-0bf2-497e-962d-51b575905e29" target="_blank">Betty Crocker</a>.</p>
        </div>
        <div class="nutrition">
            <h2 class="section-heading"><span class="icon">📊</span> Nutrition</h2>
            <p style="font-size:22px;color:#555;">No nutrition data available for this recipe.</p>
        </div>
        <button class="reset-button" onclick="resetCheckboxes()">&#10003; Reset All Checkboxes</button>
    </main>
    <footer>Powered by &#9749; &amp; &#127790;</footer>
    <script>
        function resetCheckboxes(){document.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false)}
    </script>
</body>
</html>
