<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Cake with Strawberry Frosting</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        main { padding-bottom: 40px; }
        footer { padding: 24px 0 60px; font-size: 22px; text-align: center; color: #888; border-top: 1px solid #e8e8e8; margin-top: 40px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin: 20px 0 16px; font-size: 22px; color: #6bb8d4; text-decoration: none; font-weight: 600; letter-spacing: 0.01em; }
        .back-link:hover { color: #4a9db8; }
        header { position: relative; height: 300px; background-size: cover; background-position: center; background-color: #444; overflow: hidden; width: 100vw; margin-left: calc(-50vw + 50%); }
        header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 55%, transparent 100%); }
        header .header-banner { position: absolute; bottom: 0; left: 0; right: 0; padding: 22px 8%; color: #fff; font-size: 32px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; background: none; height: auto; display: block; text-align: left; z-index: 1; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .section-heading { display: flex; align-items: center; gap: 10px; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #222; margin: 36px 0 18px; padding-bottom: 8px; border-bottom: 3px solid #6bb8d4; }
        .section-heading .icon { font-size: 22px; }
        .check-item { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; padding: 14px 16px; background: #f8fbfd; border-radius: 8px; border-left: 4px solid transparent; transition: border-color 0.2s, background 0.2s; }
        .check-item:has(input:checked) { border-left-color: #6bb8d4; background: #eef7fb; }
        .check-item input[type="checkbox"] { flex-shrink: 0; width: 28px; height: 28px; margin-top: 2px; accent-color: #6bb8d4; cursor: pointer; }
        .check-item label { font-size: 24px; line-height: 1.4; cursor: pointer; flex: 1; }
        input[type="checkbox"]:checked + label { text-decoration: line-through; color: #999; }
        .step-num { flex-shrink: 0; width: 36px; height: 36px; background: #6bb8d4; color: white; font-size: 18px; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 0; }
        .check-item:has(input:checked) .step-num { background: #a8d8ea; }
        .subsection-label { font-size: 20px; font-weight: 700; color: #555; margin: 24px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }
        .nutrition { margin-top: 12px; }
        .reset-button { width: 100%; padding: 24px 0; margin: 40px auto 0; font-size: 22px; font-weight: 800; color: white; background: linear-gradient(135deg, #6bb8d4 0%, #4a9db8 100%); border: none; border-radius: 10px; cursor: pointer; display: block; letter-spacing: 0.05em; text-transform: uppercase; box-shadow: 0 4px 12px rgba(107,184,212,0.4); transition: transform 0.1s, box-shadow 0.1s; }
        .reset-button:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(107,184,212,0.3); }
    </style>
</head>
<body>
    <header style="background-image: url('images/white-cake-with-strawberry-frosting.jpg')">
        <div class="header-banner">White Cake with Strawberry Frosting</div>
    </header>
    <main>
        <a href="index.html" class="back-link">&#8592; Back to Recipes</a>
        <div class="ingredients">
            <h2 class="section-heading"><span class="icon">🛒</span> Ingredients</h2>
            <p class="subsection-label">White Cake</p>
            <div class="check-item">
                <input type="checkbox" id="ing1">
                <label for="ing1">6 tablespoons butter, softened</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing2">
                <label for="ing2">3 cups white granulated sugar</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing3">
                <label for="ing3">⅔ cup vegetable oil</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing4">
                <label for="ing4">1 tablespoon vanilla</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing5">
                <label for="ing5">2⅔ + 2 tablespoons all-purpose white flour</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing6">
                <label for="ing6">1 tablespoon baking powder</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing7">
                <label for="ing7">1 teaspoon salt</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing8">
                <label for="ing8">1 cup milk</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing9">
                <label for="ing9">6 large egg whites, room temp, beaten to a stiff peak</label>
            </div>
            <p class="subsection-label">Strawberry Frosting</p>
            <div class="check-item">
                <input type="checkbox" id="ing10">
                <label for="ing10">1 — 8 oz package of freeze-dried strawberries, crushed until almost completely powder</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing11">
                <label for="ing11">1 cup butter, room temp</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing12">
                <label for="ing12">¼ teaspoon salt</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing13">
                <label for="ing13">3 cups powdered sugar</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing14">
                <label for="ing14">3 tablespoons heavy cream</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="ing15">
                <label for="ing15">1 teaspoon vanilla</label>
            </div>
        </div>
        <div class="preparation">
            <h2 class="section-heading"><span class="icon">👩‍🍳</span> Instructions</h2>
            <p class="subsection-label">White Cake</p>
            <div class="check-item">
                <input type="checkbox" id="step1">
                <span class="step-num">1</span>
                <label for="step1">Preheat oven to 350°F. Line three 9-inch cake pans with parchment paper.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step2">
                <span class="step-num">2</span>
                <label for="step2">In a large bowl, cream butter and sugar until light and fluffy, then add oil and vanilla and mix to combine.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step3">
                <span class="step-num">3</span>
                <label for="step3">In another bowl, whisk flour, baking powder, and salt; add to creamed mixture alternately with milk, beating well after each addition, starting and ending with the flour mixture.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step4">
                <span class="step-num">4</span>
                <label for="step4">Using a spatula, gently fold the egg whites into the batter, taking care to scrape the sides and bottom of the bowl so that all is well combined. Don't over mix.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step5">
                <span class="step-num">5</span>
                <label for="step5">Evenly pour cake batter between each cake pan. Bake for 30–35 minutes or until a toothpick inserted in the center comes out clean.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step6">
                <span class="step-num">6</span>
                <label for="step6">Cool in pans for 10 minutes before removing to wire racks to cool completely.</label>
            </div>
            <p class="subsection-label">Strawberry Frosting</p>
            <div class="check-item">
                <input type="checkbox" id="step7">
                <span class="step-num">7</span>
                <label for="step7">Beat butter with an electric mixer until creamy, about 2–4 minutes.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step8">
                <span class="step-num">8</span>
                <label for="step8">Add salt and vanilla, then gradually add sugar, ½ cup at a time, waiting until each addition is completely mixed in before adding the next.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step9">
                <span class="step-num">9</span>
                <label for="step9">Mix in powdered freeze-dried strawberries.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step10">
                <span class="step-num">10</span>
                <label for="step10">Add cream 1 tablespoon at a time and then beat on high for 30 seconds.</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="step11">
                <span class="step-num">11</span>
                <label for="step11">Spread frosting over the cake quickly as the frosting gets firmer with the passage of time. Decorate with fresh strawberries and enjoy!</label>
            </div>
        </div>
        <div class="nutrition">
            <h2 class="section-heading"><span class="icon">📊</span> Nutrition</h2>
            <p style="font-size:20px; color:#666;">No nutrition information provided.</p>
        </div>
        <button class="reset-button" onclick="resetCheckboxes()">&#10003; Reset All Checkboxes</button>
    </main>
    <footer>Powered by &#9749; &amp; &#127790;</footer>
    <script>
        function resetCheckboxes() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        }
    </script>
</body>
</html>
